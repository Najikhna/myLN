<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myLN | CODE:ZERO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="main-app">
        <nav>
            <div class="logo">my<span>LN</span></div>
            
            <div class="nav-actions">
                <button id="theme-btn" class="theme-toggle" onclick="toggleTheme()" title="Ubah Tema">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                
                <span id="user-tag" class="hidden"></span>
                <button id="auth-btn" onclick="openLoginModal()" class="btn-login-nav">LOGIN</button>
            </div>
        </nav>

        <header>
            <div class="hero-banner">
                <span class="badge">SERI ORIGINAL</span>
                <h1>CODE:ZERO</h1>
                <h3>The Aetherian Architect</h3>
                <p>Status: <span class="status-blink">ONGOING</span> | Author: <strong>Najikh</strong></p>
            </div>
        </header>

        <section class="container">
            <h2 class="section-title">DAFTAR CHAPTER</h2>
            <p id="loading-msg" class="loading-text">Menghubungkan ke server myLN...</p>
            <div id="chapter-list" class="chapter-grid"></div>
        </section>

        <footer>
            <p>&copy; 2026 <strong>myLN</strong> Project. Host via GitHub Pages (@Najikhna).</p>
        </footer>
    </div>

    <div id="reader-view" class="hidden">
        <div class="reader-nav">
            <button onclick="closeReader()" class="btn-back">← KEMBALI</button>
            <h2 id="reader-title">Judul Chapter</h2>
        </div>
        <div id="reader-content" class="ln-body"></div>
        <div class="reader-end">
            <button onclick="closeReader()" class="btn-finish">SELESAI MEMBACA</button>
        </div>
    </div>

    <div id="login-overlay" class="overlay hidden">
        <div class="login-card">
            <button class="close-modal" onclick="closeLoginModal()">✖</button>
            <h2>my<span>LN</span> LOGIN</h2>
            <p>Akses Khusus Sistem</p>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required autocomplete="off">
                
                <div class="password-box">
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="button" id="toggle-password" onclick="togglePasswordVisibility()">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>

                <p class="guest-hint">Akses Tamu -> Usn: <span>guest</span> | Sandi: <span>guest-guest</span></p>
                <button type="submit" class="btn-login-form">MASUK</button>
            </form>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
