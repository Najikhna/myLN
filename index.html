<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myLN | CODE:ZERO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="navbar">
        <div class="logo">my<span>LN</span></div>
        
        <div class="header-right">
            <span id="teksUser" class="hidden"></span>
            
            <button class="btn-icon" onclick="gantiTema()" title="Ganti Tema">
                <span class="material-icons" id="iconTema">light_mode</span>
            </button>
            <button class="btn-icon" onclick="bukaLogin()" id="btnLogin" title="Login">
                <span class="material-icons">login</span>
            </button>
            <button class="btn-icon hidden" onclick="logout()" id="btnLogout" title="Logout" style="color: #ff5252;">
                <span class="material-icons">logout</span>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="comic-grid" id="gridChapter"></div>
    </main>

    <button class="fab hidden" id="fabTambah" onclick="bukaForm()">
        <span class="material-icons">add</span>
    </button>

    <div class="modal-overlay hidden" id="modalLogin">
        <div class="modal-card">
            <button class="btn-close-red" onclick="tutupLogin()">
                <span class="material-icons" style="font-size: 18px;">close</span>
            </button>
            
            <h2 class="login-title">LOG-IN</h2>
            
            <input type="text" id="inUser" placeholder="Username" autocomplete="off" class="input-form">
            
            <div class="pass-wrapper">
                <input type="password" id="inPass" placeholder="Password" class="input-form pass-input">
                <span class="material-icons btn-eye" onclick="lihatPassword()" id="mataIcon">visibility</span>
            </div>
            
            <p class="hint-text">Admin: admin | Tamu: guest</p>
            
            <button class="btn-primary" onclick="prosesLogin()">MASUK</button>
            <p id="errLogin" class="error-msg"></p>
        </div>
    </div>

    <div class="modal-overlay hidden" id="modalForm">
        <div class="modal-card" style="max-width: 600px;">
            <h2 id="judulForm" style="margin-bottom: 15px;">Tambah Chapter</h2>
            <input type="hidden" id="editId">
            <input type="text" id="inJudul" placeholder="Judul Chapter" class="input-form">
            <input type="text" id="inCover" placeholder="Link Cover (Opsional)" class="input-form">
            <textarea id="inCerita" placeholder="Tulis cerita di sini..." class="input-form" style="height: 200px; resize: vertical;"></textarea>
            <button class="btn-primary" onclick="simpanChapter()" style="margin-bottom: 10px;">SIMPAN</button>
            <button class="btn-cancel" onclick="tutupForm()">BATAL</button>
        </div>
    </div>

    <div class="reader-modal hidden" id="modalBaca">
        <div class="reader-header" id="readerNav">
            <button class="btn-back" onclick="tutupBaca()">
                <span class="material-icons">arrow_back</span>
            </button>
            <h3 id="bacaJudul">Judul</h3>
        </div>
        <div class="reader-content">
            <div id="bacaIsi" class="teks-cerita"></div>
            
            <div id="aksiAdmin" class="admin-actions hidden">
                <button class="btn-primary" onclick="editDariBaca()" style="width: 48%;">EDIT</button>
                <button class="btn-danger" onclick="hapusDariBaca()" style="width: 48%;">HAPUS</button>
            </div>
        </div>
    </div>

    <div id="toastBox">Pesan</div>

    <script src="script.js"></script>
</body>
</html>
