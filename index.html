<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myLN | CODE:ZERO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <meta name="theme-color" content="#00f2fe">

    <style>
        /* CSS ASLI MY KOMIK ASELI (Diadaptasi sedikit untuk Light Novel) */
        :root {
            --glass-bg: rgba(30, 30, 30, 0.85);
            --glass-border: 1px solid rgba(255, 255, 255, 0.12);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --text-main: #ffffff; 
            --accent: #00f2fe; /* Warna cyan/neon asli kamu */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; color: var(--text-main); min-height: 100vh;
            /* Background original dari web komikmu */
            background: url('https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=2670&auto=format&fit=crop') no-repeat center center fixed; 
            background-size: cover; transition: background 0.5s;
        }

        /* --- TEMA TERANG --- */
        body.light-mode {
            --glass-bg: rgba(255, 255, 255, 0.95);
            --glass-border: 1px solid rgba(0, 0, 0, 0.12);
            --text-main: #111111;
        }

        /* --- HEADER & NAV --- */
        header { 
            position: sticky; top: 0; z-index: 100; 
            background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(12px); 
            border-bottom: var(--glass-border); padding: 10px 15px; 
            display: flex; align-items: center; gap: 10px; transition: 0.3s; 
        }
        body.light-mode header { background: rgba(255, 255, 255, 0.9); }
        
        .logo { font-size: 1.2rem; font-weight: 800; letter-spacing: 1px; margin-right: 5px;}
        .logo span { color: var(--accent); }
        
        /* KOLOM PENCARIAN BAWAAN KOMIK */
        .search-wrapper { flex-grow: 1; position: relative; }
        .search-wrapper input { 
            width: 100%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
            color: var(--text-main); padding: 8px 35px 8px 15px; border-radius: 20px; font-size: 0.9rem; 
        }
        body.light-mode .search-wrapper input { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.2); }
        .search-wrapper .material-icons { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.5); pointer-events: none; }
        
        .btn-icon { background: none; border: none; color: var(--text-main); cursor: pointer; display: flex; align-items: center; padding: 8px; border-radius: 50%; transition: 0.3s; }
        .btn-icon:hover { background: rgba(255,255,255,0.1); }

        /* --- DAFTAR GRID CHAPTER --- */
        .main-content { padding: 15px; padding-bottom: 80px; }
        #loadingMsg { text-align: center; margin-top: 50px; font-weight: bold; color: var(--accent); font-size: 1.1rem; }
        
        .comic-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 600px) { .comic-grid { grid-template-columns: repeat(4, 1fr); gap: 15px; } }

        .comic-card { position: relative; border-radius: 8px; overflow: hidden; background: var(--glass-bg); border: var(--glass-border); box-shadow: var(--glass-shadow); display: flex; flex-direction: column; transition: transform 0.2s; cursor: pointer; }
        .comic-card:active { transform: scale(0.96); }

        .card-img-wrapper { width: 100%; aspect-ratio: 2/3; overflow: hidden; position: relative; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
        .card-overlay { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.95) 10%, rgba(0,0,0,0.5) 80%, transparent 100%); padding: 30px 10px 10px 10px; }
        
        .card-title { font-size: 0.85rem; font-weight: 700; color: white; white-space: normal; line-height: 1.2; text-shadow: 0 1px 2px black; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        .badge-ch { position: absolute; top: 8px; left: 8px; background: var(--accent); font-size: 0.7rem; font-weight: bold; padding: 4px 8px; border-radius: 4px; color: black; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        /* --- READER (HALAMAN BACA) --- */
        .reader-modal { position: fixed; inset: 0; background: var(--glass-bg); z-index: 200; overflow-y: auto; display: none; padding: 0; animation: fadeIn 0.3s; backdrop-filter: blur(15px); }
        .reader-header { position: sticky; top: 0; background: rgba(10,10,10,0.95); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid var(--accent); z-index: 210; }
        body.light-mode .reader-header { background: rgba(240,240,240,0.95); }
        
        .btn-back { background: none; border: none; color: var(--accent); font-weight: bold; display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 1rem; }
        .reader-title { margin-left: 15px; font-size: 1rem; font-weight: bold; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .reader-content { padding: 25px 5%; max-width: 800px; margin: 0 auto; font-size: 1.1rem; line-height: 1.8; color: var(--text-main); }
        .reader-content img { max-width: 100%; border-radius: 8px; margin: 15px 0; display: block; }
        .reader-content p { margin-bottom: 20px; text-align: justify; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s forwards; }
    </style>
</head>
<body>

    <header>
        <div class="logo">my<span>LN</span></div>
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="Cari Judul..." onkeyup="filterSearch()">
            <span class="material-icons">search</span>
        </div>
        <button class="btn-icon" onclick="toggleTheme()">
            <span class="material-icons" id="themeIcon">light_mode</span>
        </button>
    </header>

    <div class="main-content">
        <div id="loadingMsg">Memuat dari Blogger...</div>
        <div class="comic-grid" id="chapterList"></div>
    </div>

    <div class="reader-modal" id="readerModal">
        <div class="reader-header">
            <button class="btn-back" onclick="closeReader()">
                <span class="material-icons">arrow_back</span> Kembali
            </button>
            <div class="reader-title" id="readerTitle">Judul Chapter</div>
        </div>
        <div class="reader-content" id="readerBody">
            </div>
    </div>

    <script>
        // LINK BLOGGER
        const BLOG_URL = "https://mylnrill.blogspot.com/feeds/posts/default?alt=json";
        let lnData = [];

        // JALANKAN SAAT WEB DIBUKA
        document.addEventListener('DOMContentLoaded', () => {
            fetchChapters();
        });

        // FUNGSI TEMA (GELAP/TERANG)
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const icon = document.getElementById('themeIcon');
            if(document.body.classList.contains('light-mode')) {
                icon.innerText = 'dark_mode';
            } else {
                icon.innerText = 'light_mode';
            }
        }

        // FUNGSI AMBIL DATA DARI BLOGGER
        async function fetchChapters() {
            try {
                const response = await fetch(BLOG_URL);
                const data = await response.json();
                
                if (!data.feed.entry) {
                    document.getElementById('loadingMsg').innerText = "Belum ada chapter diposting.";
                    return;
                }

                // Kita balik datanya agar chapter 1 di bawah, chapter terbaru di atas (opsional, bisa hapus .reverse() kalau mau dibalik)
                lnData = data.feed.entry.reverse().map((post, index) => {
                    
                    // Ekstraksi Gambar: Sistem otomatis mencari gambar pertama dari Blogger untuk dijadikan cover
                    let coverImg = 'https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?q=80&w=2670&auto=format&fit=crop';
                    const doc = new DOMParser().parseFromString(post.content.$t, 'text/html');
                    const imgTag = doc.querySelector('img');
                    if (imgTag && imgTag.src) {
                        coverImg = imgTag.src;
                    }

                    return {
                        id: index + 1,
                        title: post.title.$t,
                        content: post.content.$t,
                        cover: coverImg
                    };
                });

                document.getElementById('loadingMsg').style.display = 'none';
                renderChapters(lnData);
            } catch (err) {
                document.getElementById('loadingMsg').innerText = "Gagal terhubung ke Blogger.";
            }
        }

        // FUNGSI TAMPILKAN GRID KARTU (GAYA KOMIK)
        function renderChapters(data) {
            const list = document.getElementById('chapterList');
            list.innerHTML = '';

            data.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'comic-card fade-in';
                // Saat kartu diklik, buka area baca
                card.onclick = () => openReader(ch.id);

                card.innerHTML = `
                    <div class="card-img-wrapper">
                        <img class="card-img" src="${ch.cover}" alt="cover" loading="lazy">
                    </div>
                    <div class="badge-ch">CH ${ch.id}</div>
                    <div class="card-overlay">
                        <div class="card-title">${ch.title}</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // FUNGSI PENCARIAN (SEARCH)
        function filterSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = lnData.filter(ch => ch.title.toLowerCase().includes(query));
            renderChapters(filtered);
        }

        // FUNGSI BUKA HALAMAN BACA
        function openReader(id) {
            const ch = lnData.find(x => x.id === id);
            if(!ch) return;

            document.getElementById('readerTitle').innerText = ch.title;
            document.getElementById('readerBody').innerHTML = ch.content;
            
            document.getElementById('readerModal').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Mengunci scroll halaman utama
        }

        // FUNGSI KEMBALI DARI HALAMAN BACA
        function closeReader() {
            document.getElementById('readerModal').style.display = 'none';
            document.body.style.overflow = 'auto'; // Membuka kembali scroll utama
        }
    </script>
</body>
</html>
