<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myLN | CODE:ZERO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8a2be2">
    <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
    <header id="navbar" class="glass-panel">
        <div class="logo" onclick="kembaliKeBeranda()">my<span>LN</span></div>
        <div class="header-right">
            <span id="teksUser" class="hidden user-badge"></span>
            <button class="btn-icon" onclick="togglePencarian()"><span class="material-icons">search</span></button>
            <button class="btn-icon" onclick="gantiTema()"><span class="material-icons" id="iconTema">light_mode</span></button>
            <button class="btn-icon" onclick="bukaLogin()" id="btnLogin"><span class="material-icons">login</span></button>
            <button class="btn-icon hidden" onclick="logout()" id="btnLogout" style="color: #ff3366;"><span class="material-icons">logout</span></button>
        </div>
    </header>

    <div id="searchOverlay" class="search-dropdown hidden">
        <input type="text" id="inCariUtama" placeholder="Cari judul atau genre..." oninput="cariNovel()">
    </div>

    <main id="viewUtama" class="main-content view-transisi">
        <div class="hero-banner"><h1>LIBRARY</h1></div>
        <div class="novel-grid" id="gridNovel"></div>
        <button class="fab hidden" id="fabTambahNovel" onclick="bukaFormNovel()"><span class="material-icons">add</span></button>
        <button class="fab-left hidden" id="fabInstallApp" onclick="installAplikasi()"><span class="material-icons">download</span></button>
    </main>

    <main id="viewDetail" class="hidden">
        <div class="detail-banner" id="detailBannerBg"></div>
        <div class="detail-container">
            <button class="btn-back-detail" onclick="kembaliKeBeranda()"><span class="material-icons">arrow_back</span> Kembali</button>
            <div class="detail-header">
                <img id="detailCover" src="" class="detail-cover">
                <div class="detail-info">
                    <h2 id="detailJudul">Judul Novel</h2>
                    <p class="detail-genre">Genre: <span id="detailGenreteks">Unknown</span></p>
                </div>
            </div>
            <div class="detail-actions">
                <button class="btn-baca" onclick="bacaBabPertama()"><span class="material-icons">menu_book</span> MULAI BACA</button>
                <button class="btn-admin-action hidden" id="btnHapusNovel" onclick="hapusNovel()"><span class="material-icons">delete_outline</span></button>
            </div>
            <div class="detail-synopsis"><h3>SINOPSIS</h3><p id="detailSinopsis"></p></div>
            <div class="detail-chapters">
                <div class="chapter-header-row">
                    <h3>DAFTAR CHAPTER</h3>
                    <button class="btn-admin-action hidden" id="btnTambahChapter" onclick="bukaFormChapter()">+ CHAPTER</button>
                </div>
                <div id="listChapter" class="chapter-list-container"></div>
            </div>
        </div>
    </main>

    <div class="reader-modal hidden" id="modalBaca">
        <div class="reader-header" id="readerNav">
            <button class="btn-back" onclick="tutupBaca()"><span class="material-icons">arrow_back</span></button>
            <button class="btn-icon hidden" id="btnMusik" onclick="toggleMusik()" style="margin-left: 5px; width: 35px; height: 35px;">
                <span class="material-icons music-paused" id="iconSound">volume_off</span>
            </button>
            <h3 id="bacaJudulTeks" style="margin-left: 10px; font-size: 0.95rem; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 140px;">Judul</h3>
            <button class="btn-icon" onclick="toggleSettingBaca()" style="margin-left: auto;"><span class="material-icons">settings</span></button>
        </div>

        <div id="settingBacaBox" class="setting-reader-box hidden glass-panel">
            <p>Ukuran Font</p>
            <div class="font-controls">
                <button onclick="ubahFontSize(-2)">A-</button>
                <span id="fontSizeTeks">18px</span>
                <button onclick="ubahFontSize(2)">A+</button>
            </div>
            <p>Tema Kertas</p>
            <div class="theme-paper-controls">
                <div class="paper white" onclick="setPaper('white')"></div>
                <div class="paper sepia" onclick="setPaper('sepia')"></div>
                <div class="paper dark" onclick="setPaper('dark')"></div>
            </div>
        </div>

        <div class="reader-content">
            <audio id="bgmPlayer" loop preload="auto"></audio>
            <div class="chapter-img-container hidden" id="boxGambarChapter">
                <img id="imgChapter" src="" alt="Ilustrasi">
            </div>
            <div id="bacaIsi" class="teks-cerita"></div>
            
            <div class="reader-nav-bottom">
                <button id="btnPrevCh" onclick="navigasiChapter('prev')"><span class="material-icons">arrow_back</span></button>
                <div id="infoChSekarang" style="font-family:'Orbitron'; font-size:12px; opacity:0.6;">CH 1</div>
                <button id="btnNextCh" onclick="navigasiChapter('next')"><span class="material-icons">arrow_forward</span></button>
            </div>

            <div id="aksiAdminChapter" class="admin-actions hidden">
                <button class="btn-primary" onclick="editChapterDariBaca()">EDIT CHAPTER</button>
                <button class="btn-cancel" onclick="hapusChapterDariBaca()">HAPUS CHAPTER</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay hidden" id="modalLogin">
        <div class="modal-card glass-panel">
            <button class="btn-close-red" onclick="tutupLogin()"><span class="material-icons">close</span></button>
            <h2 class="login-title">LOG-IN</h2>
            <input type="text" id="inUser" placeholder="Username" class="input-form">
            <div class="pass-wrapper">
                <input type="password" id="inPass" placeholder="Password" class="input-form pass-input">
                <span class="material-icons btn-eye" onclick="lihatPassword()" id="mataIcon">visibility</span>
            </div>
            <button class="btn-primary" onclick="prosesLogin()">MASUK</button>
            <p id="errLogin" class="error-msg"></p>
        </div>
    </div>

    <div class="modal-overlay hidden" id="modalFormNovel">
        <div class="modal-card glass-panel">
            <h2 style="font-family:'Orbitron'; margin-bottom:15px; color:var(--primary); text-align:center;">Novel Baru</h2>
            <input type="text" id="inJudulNovel" placeholder="Judul Novel" class="input-form">
            <input type="text" id="inGenreNovel" placeholder="Genre (Pisahkan koma)" class="input-form">
            <label style="font-size:11px; color:var(--primary); margin-bottom:5px; display:block;">Upload Cover</label>
            <input type="file" id="inFileCover" accept="image/*" class="input-form" style="padding:10px;">
            <input type="hidden" id="inBase64Cover">
            <textarea id="inSinopsis" placeholder="Tulis sinopsis..." class="input-form" style="height:100px; resize:vertical;"></textarea>
            <button class="btn-primary" onclick="simpanNovel()">SIMPAN NOVEL</button>
            <button class="btn-cancel" onclick="tutupFormNovel()">BATAL</button>
        </div>
    </div>

    <div class="modal-overlay hidden" id="modalFormChapter">
        <div class="modal-card glass-panel form-chapter-card">
            <h2 id="judulFormChapter" style="font-family:'Orbitron'; margin-bottom:15px; color:var(--primary); text-align:center;">Tambah Chapter</h2>
            <input type="hidden" id="editChapterId">
            <input type="text" id="inJudulChapter" placeholder="Judul Chapter" class="input-form">
            
            <label style="font-size:11px; color:var(--primary); margin-bottom:5px; display:block;">Gambar Ilustrasi (Opsional)</label>
            <input type="file" id="inFileGambarCh" accept="image/*" class="input-form" style="padding:10px;">
            <input type="hidden" id="inBase64GambarCh">

            <label style="font-size:11px; color:var(--primary); margin-bottom:5px; display:block;">Link Lagu (Bisa YouTube/Google Drive)</label>
            <input type="url" id="inLinkMusik" placeholder="https://drive.google.com/..." class="input-form">
            
            <textarea id="inIsiChapter" placeholder="Ketik cerita di sini..." class="input-form" style="height:180px; resize:vertical;"></textarea>
            
            <button class="btn-primary" onclick="simpanChapter()">SIMPAN CHAPTER</button>
            <button class="btn-cancel" onclick="tutupFormChapter()">BATAL</button>
        </div>
    </div>

    <div id="toastBox">Pesan</div>
    <script src="script.js?v=11"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log('Aplikasi Siap!'));
        }
    </script>
</body>
</html>
